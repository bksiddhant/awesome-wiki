<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Oxanium:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="https://www.onepointltd.com/wp-content/uploads/2025/09/onepoint-mint.png">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <!-- Using an image to mimic the brand guidelines logo feeling, but not strictly Onepoint -->
                <div class="logo">
                     <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#0000EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="#0000EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="#0000EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Awesome Wiki</span>
                </div>
            </div>
            
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Navigation links will be dynamically populated here -->
                <div class="loader">Loading...</div>
            </nav>
            
            <div class="sidebar-footer">
                <p>Built for the FOSS community.</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header (Mobile Toggle & Breadcrumbs) -->
            <header class="top-nav">
                <button class="menu-toggle" aria-label="Toggle menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="breadcrumbs" id="breadcrumbs">Home</div>
            </header>

            <!-- Dynamic Content Area -->
            <div class="content-wrapper" id="content-container">
                <!-- Content will be injected here -->
            </div>

            <footer class="main-footer">
                <p>Curated from <a href="https://github.com/sindresorhus/awesome" target="_blank" rel="noopener noreferrer">Sindre Sorhus's Awesome List</a>. <br> Powered by the Open Source community.</p>
            </footer>
        </main>
    </div>

    <!-- Script tags -->
    <script src="js/parser.js"></script>
    <script src="js/visuals.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
